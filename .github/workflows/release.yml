name: Release

on:
  push:
    tags:
      - 'v*.*.*'          # e.g. v0.1.0, v1.0.0-alpha, v1.2.3-beta.1

permissions:
  contents: write         # Required for creating GitHub Releases

jobs:
  # ── Build release APK ──────────────────────────────────────────────────────
  build-release:
    name: Build & sign release APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for changelog generation

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Android NDK
        uses: android-actions/setup-android@v3

      - name: Grant Gradle wrapper execute permission
        run: chmod +x gradlew

      # Decode the base64-encoded keystore from GitHub Secrets
      - name: Decode signing keystore
        run: |
          echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 --decode > keystore.jks
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}

      # Write keystore.properties so Gradle can find the signing config
      - name: Write keystore.properties
        run: |
          cat > keystore.properties << EOF
          storeFile=${{ github.workspace }}/keystore.jks
          storePassword=${{ secrets.RELEASE_STORE_PASSWORD }}
          keyAlias=${{ secrets.RELEASE_KEY_ALIAS }}
          keyPassword=${{ secrets.RELEASE_KEY_PASSWORD }}
          EOF

      - name: Build release APK
        run: ./gradlew assembleRelease

      - name: Rename APK with version tag
        run: |
          VERSION="${{ github.ref_name }}"
          cp app/build/outputs/apk/release/app-release.apk \
             "VineOS-${VERSION}.apk"

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: VineOS-*.apk
          retention-days: 90

  # ── Create GitHub Release ──────────────────────────────────────────────────
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-release
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download release APK
        uses: actions/download-artifact@v4
        with:
          name: release-apk
          path: ./release/

      - name: Generate changelog
        id: changelog
        uses: orhun/git-cliff-action@v3
        with:
          config: cliff.toml
          args: --current --strip header
        env:
          OUTPUT: CHANGELOG.md
          GITHUB_REPO: ${{ github.repository }}
        # git-cliff reads Conventional Commits and generates a formatted changelog.
        # cliff.toml config will be added in a future commit.
        # Falls back to empty body if cliff.toml doesn't exist yet.
        continue-on-error: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: VineOS ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.content }}
          draft: false
          # Mark as pre-release if tag contains a pre-release identifier
          prerelease: ${{ contains(github.ref_name, '-alpha') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
          files: release/VineOS-*.apk
          generate_release_notes: true   # Fallback if git-cliff fails
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Clean up keystore ──────────────────────────────────────────────────────
  # (runs even if build fails, to ensure no secret material is left on the runner)
  cleanup:
    name: Clean up secrets
    runs-on: ubuntu-latest
    needs: build-release
    if: always()
    steps:
      - name: Remove keystore from workspace
        run: rm -f keystore.jks keystore.properties
