name: Compile-time Sanity Checks

on:
  push:
    branches: [main, dev, 'feature/**', 'fix/**']
  pull_request:
    branches: [main, dev]

concurrency:
  group: sanity-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-gradle-properties:
    name: gradle.properties
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          grep -q "^android.useAndroidX=true"               gradle.properties || (echo "FAIL: android.useAndroidX" && exit 1)
          grep -q "^android.suppressUnsupportedCompileSdk=" gradle.properties || (echo "FAIL: suppressUnsupportedCompileSdk" && exit 1)
          echo "OK: gradle.properties"

  check-gradle-wrapper:
    name: Gradle wrapper
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          WRAPPER="gradle/wrapper/gradle-wrapper.properties"
          [ -f "$WRAPPER" ] || (echo "FAIL: wrapper properties missing" && exit 1)
          # AGP 8.9.0 requires Gradle 8.11.1+
          grep -q "gradle-8.11" "$WRAPPER" || {
            echo "FAIL: Gradle wrapper must be 8.11+. Found:"
            grep distributionUrl "$WRAPPER"
            exit 1
          }
          echo "OK: $(grep distributionUrl "$WRAPPER")"

  check-sdk-versions:
    name: SDK version declarations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          BUILD="app/build.gradle.kts"
          grep -q "compileSdk = 36" "$BUILD" || (echo "FAIL: compileSdk" && exit 1)
          grep -q "minSdk = 26"     "$BUILD" || (echo "FAIL: minSdk"     && exit 1)
          grep -q "targetSdk = 36"  "$BUILD" || (echo "FAIL: targetSdk"  && exit 1)
          grep -q '"arm64-v8a"'     "$BUILD" || (echo "FAIL: arm64-v8a ABI filter" && exit 1)
          echo "OK: SDK versions"

  check-cmake:
    name: CMakeLists.txt source files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          CPP_DIR="app/src/main/cpp"
          SOURCES=$(awk '/set\(VINE_SOURCES/,/\)/' "$CPP_DIR/CMakeLists.txt" | grep -oE '[a-zA-Z_/]+\.cpp')
          ALL_OK=true
          for src in $SOURCES; do
            [ -f "$CPP_DIR/$src" ] && echo "  OK: $src" || { echo "  FAIL: $src"; ALL_OK=false; }
          done
          $ALL_OK || exit 1

  check-manifest:
    name: AndroidManifest.xml
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          M="app/src/main/AndroidManifest.xml"
          grep -q "FOREGROUND_SERVICE\"" "$M" || (echo "FAIL: FOREGROUND_SERVICE" && exit 1)
          grep -q "INTERNET\""           "$M" || (echo "FAIL: INTERNET" && exit 1)
          grep -q "WAKE_LOCK\""          "$M" || (echo "FAIL: WAKE_LOCK" && exit 1)
          grep -q "VineApplication"      "$M" || (echo "FAIL: VineApplication" && exit 1)
          grep -q "VineService"          "$M" || (echo "FAIL: VineService" && exit 1)
          echo "OK: manifest"

  check-version-catalog:
    name: libs.versions.toml
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          C="gradle/libs.versions.toml"
          for lib in agp kotlin compose-bom hilt room ktlint; do
            grep -q "^${lib} = " "$C" || (echo "FAIL: $lib not pinned" && exit 1)
            echo "  OK: $lib = $(grep "^${lib} = " "$C" | cut -d'"' -f2)"
          done

  check-test-structure:
    name: Test source directories
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          TEST="app/src/test/java/com/hexadecinull/vineos"
          ATEST="app/src/androidTest/java/com/hexadecinull/vineos"
          [ -d "$TEST"  ] || (echo "FAIL: unit test dir missing"        && exit 1)
          [ -d "$ATEST" ] || (echo "FAIL: instrumented test dir missing" && exit 1)
          UNIT=$(find "$TEST"  -name "*Test.kt" | wc -l)
          INST=$(find "$ATEST" -name "*Test.kt" | wc -l)
          [ "$UNIT" -ge 1 ] || (echo "FAIL: no unit tests"        && exit 1)
          [ "$INST" -ge 1 ] || (echo "FAIL: no instrumented tests" && exit 1)
          echo "OK: $UNIT unit test(s), $INST instrumented test(s)"
