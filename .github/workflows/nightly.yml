name: Nightly Build

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
  workflow_run:
    workflows: [CI]
    branches: [main]
    types: [completed]

jobs:
  nightly:
    name: Nightly debug build
    runs-on: ubuntu-latest
    if: |
      github.repository == 'Hexadecinull/VineOS' &&
      (github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success')

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Android SDK + NDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run unit tests
        run: ./gradlew :app:testDebugUnitTest

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug

      - name: Get metadata
        id: meta
        run: |
          echo "sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          echo "date=$(date +%Y%m%d)" >> "$GITHUB_OUTPUT"

      - name: Rename APK
        run: |
          cp app/build/outputs/apk/debug/app-debug.apk \
             "VineOS-nightly-${{ steps.meta.outputs.date }}-${{ steps.meta.outputs.sha }}.apk"

      - name: Upload nightly APK
        uses: actions/upload-artifact@v4
        with:
          name: nightly-${{ steps.meta.outputs.sha }}
          path: VineOS-nightly-*.apk
          retention-days: 7

      - name: Open issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Nightly build failed (${new Date().toISOString().slice(0,10)})`,
              body: `Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`,
              labels: ['bug', 'ci'],
            });
