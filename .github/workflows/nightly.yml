name: Nightly Build

on:
  schedule:
    # Run at 02:00 UTC every night
    - cron: '0 2 * * *'
  # Allow manual trigger from the Actions tab
  workflow_dispatch:

jobs:
  nightly:
    name: Nightly debug build
    runs-on: ubuntu-latest
    # Only run on the main branch
    if: github.repository == 'Hexadecinull/VineOS'

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Android NDK
        uses: android-actions/setup-android@v3

      - name: Grant Gradle wrapper execute permission
        run: chmod +x gradlew

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Get short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Rename APK with date + SHA
        run: |
          DATE=$(date +%Y%m%d)
          cp app/build/outputs/apk/debug/app-debug.apk \
             "VineOS-nightly-${DATE}-${{ steps.sha.outputs.short }}.apk"

      - name: Upload nightly APK
        uses: actions/upload-artifact@v4
        with:
          name: nightly-${{ steps.sha.outputs.short }}
          path: VineOS-nightly-*.apk
          retention-days: 7   # Nightly artifacts expire after a week

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Nightly build failed (${new Date().toISOString().slice(0,10)})`,
              body: `The nightly build failed.\n\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`,
              labels: ['bug', 'ci']
            })
