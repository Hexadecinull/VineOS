name: CodeQL

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev
  schedule:
    # Weekly deep scan every Monday at 03:00 UTC
    - cron: '0 3 * * 1'

permissions:
  actions: read
  contents: read
  security-events: write   # Required to upload SARIF results

jobs:
  analyze:
    name: CodeQL analysis (${{ matrix.language }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        language:
          - java-kotlin   # Covers all .kt and .java files
          - cpp           # Covers all .cpp and .h files in app/src/main/cpp

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # CodeQL needs the project to build successfully to analyse compiled artifacts.
      # For java-kotlin: Gradle compiles to .class files that CodeQL analyses.
      # For cpp: CodeQL intercepts the compiler invocations via a build tracer.
      - name: Set up Android SDK + NDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # Initialize CodeQL toolchain for the current language
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          # VineOS-specific query suites:
          # - security-and-quality: standard OWASP-style checks
          # - security-extended: deeper but slower; good for weekly scans
          queries: security-and-quality
          config: |
            paths-ignore:
              - app/build/**
              - '**/*.pb.kt'    # Generated protobuf files
              - app/schemas/**  # Room schema exports

      # Build the project so CodeQL can trace compiled artifacts.
      # We use assembleDebug which skips release minification (faster for analysis).
      - name: Build project for CodeQL
        run: ./gradlew :app:assembleDebug

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
          # Upload SARIF results to the Security tab
          upload: true

  # ── Summary ────────────────────────────────────────────────────────────────
  # A separate job that aggregates results and posts a PR comment summarising
  # any new findings. Only runs on pull_request events.
  codeql-summary:
    name: CodeQL results summary
    runs-on: ubuntu-latest
    needs: analyze
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write
      security-events: read
    steps:
      - name: Post CodeQL summary comment
        uses: actions/github-script@v7
        with:
          script: |
            const body = [
              '## 🔍 CodeQL Analysis Complete',
              '',
              'CodeQL security analysis has finished for this PR.',
              'Any findings will appear in the **Security → Code scanning alerts** tab.',
              '',
              `**Run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            ].join('\n');

            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
